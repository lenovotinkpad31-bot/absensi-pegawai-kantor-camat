<body>

    </table>

    <script>
        const SUPABASE_URL = 'sb_publishable_-nRW19n12GUIzQH2dLV89A_3Zxq461d';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNubWx6aWNkcGdjc2toeWN4cXFmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI2Mjg2MTIsImV4cCI6MjA4ODIwNDYxMn0.LJtCk7Yare4WDqn_5Ub4qF8SSrTfudfVsSd43BpeKxE';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function muatData() {

        }
        
        muatData();
        setInterval(muatData, 5000); // Update otomatis tiap 5 detik
    </script>
</body>
